dual_f7_exact_probe:
  id: "bz_dual_f7_exact_probe_v1"
  source:
    title: "Brown and Zudilin, On cellular rational approximations to zeta(5)"
    url: "https://arxiv.org/abs/2210.03391"
    version: "v3"
    notes: "Section 5 gives the displayed summand formula for tilde F_7 and the arithmetic normalization F_7. The exact extractor follows that displayed summand line and sums its partial fractions into rational terms plus zeta values."
  cases:
    - id: "totally_symmetric"
      label: "Totally symmetric dual anchor"
      a: [1, 1, 1, 1, 1, 1, 1, 1]
      n_values: [1, 2]
    - id: "baseline_bz"
      label: "Brown-Zudilin baseline seed"
      a: [8, 16, 10, 15, 12, 16, 18, 13]
      n_values: [1]
