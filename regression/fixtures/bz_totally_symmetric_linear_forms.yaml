  source:
    title: "Brown and Zudilin, On cellular rational approximations to zeta(5)"
    url: "https://arxiv.org/abs/2210.03391"
    version: "v3"
    notes: "Section 2, equation (5), gives the totally symmetric decomposition I_n = Q_n(2 zeta(5)+4 zeta(3)zeta(2)) - 4 hat P_n zeta(2) - 2 P_n together with the initial values Q_0,Q_1,Q_2, hat P_0,hat P_1,hat P_2, P_0,P_1,P_2. The same third-order recurrence is stated to hold for Q_n, hat P_n, and P_n."
