dual_f7_zeta5_probe:
  id: "bz_dual_f7_zeta5_probe_v1"
  source:
    title: "Brown and Zudilin, On cellular rational approximations to zeta(5)"
    url: "https://arxiv.org/abs/2210.03391"
    version: "v3"
    notes: "The displayed summand formula for F_7 allows exact extraction of the zeta(5) coefficient from only the fifth-order pole data of the reduced rational term. This probe records exact signatures for fixed a-vectors."
  cases:
    - id: "totally_symmetric"
      label: "Totally symmetric dual zeta(5) coefficient sequence"
      a: [1, 1, 1, 1, 1, 1, 1, 1]
      start_index: 1
      term_count: 6
    - id: "baseline_bz"
      label: "Brown-Zudilin baseline dual zeta(5) coefficient sequence"
      a: [8, 16, 10, 15, 12, 16, 18, 13]
      start_index: 1
      term_count: 6
