survey:
  id: "bz_baseline_shift_catalog_survey_v1"
  label: "Baseline asymmetric and non-consecutive shift supports"
  max_n: 100
  moduli: [1000003, 1000033, 1000037]
  catalogs:
    - id: "order4_span4"
      label: "Order 4 supports in [-4, 4]"
      order: 4
      min_shift: -4
      max_shift: 4
      include_zero: true
      require_positive: true
      require_negative: true
      primitive_only: true
    - id: "order5_span4"
      label: "Order 5 supports in [-4, 4]"
      order: 5
      min_shift: -4
      max_shift: 4
      include_zero: true
      require_positive: true
      require_negative: true
      primitive_only: true
